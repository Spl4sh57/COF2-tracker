<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COF2 Tracker - Complet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <style>
        body { overscroll-behavior-y: none; background-color: #1a1a1a; color: #e5e5e5; font-family: system-ui, sans-serif; }
        input, select { background: #2d2d2d !important; color: white !important; border: 1px solid #444 !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCI5jcHG5D0z0lRJk2Dya4wZQw5s-xINY0",
            authDomain: "tracker-cof2.firebaseapp.com",
            projectId: "tracker-cof2",
            storageBucket: "tracker-cof2.firebasestorage.app",
            messagingSenderId: "550291814114",
            appId: "1:550291814114:web:0a6d3e9e1646bbdf4210bb"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const LISTE_CONDITIONS = ["Aveuglé", "Affaibli", "Essoufflé", "Étourdi", "Immobilisé", "Invalide", "Paralysé", "Ralenti", "Renversé", "Surpris"];

        const Icons = {
            Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Shield: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
            Zap: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            ChevronLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        };

        // --- FORMULAIRE ---
        const CharacterForm = ({ onSave, onCancel, initialData }) => {
            const [formData, setFormData] = useState(initialData || { name: '', hp: 10, hpMax: 10, init: 10, def: 10, class: '' });

            return (
                <div className="fixed inset-0 bg-black/95 z-[60] p-4 overflow-y-auto">
                    <div className="max-w-md mx-auto bg-gray-800 rounded-2xl p-6 border border-gray-700">
                        <h2 className="text-xl font-bold mb-6">{initialData ? 'Modifier' : 'Nouveau Personnage'}</h2>
                        <div className="space-y-4">
                            <div><label className="block text-xs font-bold text-gray-400 mb-1">NOM</label>
                            <input className="w-full p-3 rounded-lg" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-xs font-bold text-gray-400 mb-1">PV MAX</label>
                                <input type="number" className="w-full p-3 rounded-lg" value={formData.hpMax} onChange={e => setFormData({...formData, hpMax: parseInt(e.target.value), hp: parseInt(e.target.value)})} /></div>
                                <div><label className="block text-xs font-bold text-gray-400 mb-1">DEFENSE</label>
                                <input type="number" className="w-full p-3 rounded-lg" value={formData.def} onChange={e => setFormData({...formData, def: parseInt(e.target.value)})} /></div>
                            </div>

                            <div><label className="block text-xs font-bold text-gray-400 mb-1">INITIATIVE</label>
                            <input type="number" className="w-full p-3 rounded-lg" value={formData.init} onChange={e => setFormData({...formData, init: parseInt(e.target.value)})} /></div>
                        </div>
                        <div className="flex gap-3 mt-8">
                            <button onClick={onCancel} className="flex-1 p-3 bg-gray-700 rounded-xl font-bold">Annuler</button>
                            <button onClick={() => onSave(formData)} className="flex-1 p-3 bg-blue-600 rounded-xl font-bold">Enregistrer</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- CARTE PERSO ---
        const CharacterCard = ({ char, onClick }) => {
            const hpPercent = Math.max(0, Math.min(100, (char.hp / char.hpMax) * 100));
            const hpColor = hpPercent > 50 ? 'bg-green-500' : hpPercent > 20 ? 'bg-yellow-500' : 'bg-red-500';

            return (
                <div onClick={() => onClick(char)} className="bg-gray-800 rounded-xl p-4 border border-gray-700 active:scale-95 transition-transform shadow-lg">
                    <div className="flex justify-between items-start mb-3">
                        <h3 className="text-xl font-bold truncate pr-2">{char.name}</h3>
                        <div className="bg-blue-900/30 text-blue-400 px-3 py-1 rounded-full border border-blue-800 flex items-center gap-1 shrink-0">
                            <Icons.Zap /> <span className="font-bold">{char.init || 0}</span>
                        </div>
                    </div>
                    <div className="w-full bg-gray-700 h-2 rounded-full overflow-hidden mb-2">
                        <div className={`h-full ${hpColor} transition-all`} style={{ width: `${hpPercent}%` }}></div>
                    </div>
                    <div className="flex justify-between text-xs font-bold mb-3">
                        <span>PV: {char.hp} / {char.hpMax}</span>
                        <span className="text-gray-400 font-normal text-[10px]">DEF: {char.def}</span>
                    </div>
                    <div className="flex flex-wrap gap-1">
                        {char.conditions && char.conditions.map(c => (
                            <span key={c} className="bg-red-600 text-[9px] px-1.5 py-0.5 rounded font-black uppercase">{c}</span>
                        ))}
                    </div>
                </div>
            );
        };

        // --- APP PRINCIPALE ---
        const App = () => {
            const [characters, setCharacters] = useState([]);
            const [view, setView] = useState('list'); 
            const [selectedChar, setSelectedChar] = useState(null);

            useEffect(() => {
                const unsubscribe = db.collection("characters").onSnapshot(snap => {
                    setCharacters(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, []);

            const handleSave = async (data) => {
                if (selectedChar) await db.collection("characters").doc(selectedChar.id).update(data);
                else await db.collection("characters").add({ ...data, conditions: [] });
                setView('list');
            };

            const updateHP = async (char, val) => {
                const newHP = Math.max(0, Math.min(char.hpMax, char.hp + val));
                await db.collection("characters").doc(char.id).update({ hp: newHP });
            };

            const toggleCondition = async (char, cond) => {
                const current = char.conditions || [];
                const next = current.includes(cond) ? current.filter(c => c !== cond) : [...current, cond];
                await db.collection("characters").doc(char.id).update({ conditions: next });
            };

            const sortedMJ = useMemo(() => [...characters].sort((a, b) => (Number(b.init) || 0) - (Number(a.init) || 0)), [characters]);

            return (
                <div className="max-w-2xl mx-auto p-4 pb-24">
                    <header className="flex justify-between items-center mb-6 pt-2">
                        <h1 className="text-2xl font-black text-blue-500 italic">COF2 TRACKER</h1>
                        <button onClick={() => setView('mj')} className="bg-gray-800 px-4 py-2 rounded-lg border border-gray-700 flex items-center gap-2 font-bold text-sm">
                            <Icons.Shield /> Vue MJ
                        </button>
                    </header>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {characters.map(c => <CharacterCard key={c.id} char={c} onClick={(char) => { setSelectedChar(char); setView('detail'); }} />)}
                    </div>

                    {/* MODAL DETAIL */}
                    {view === 'detail' && selectedChar && (
                        <div className="fixed inset-0 bg-black/90 z-50 p-4 flex flex-col items-center justify-center">
                            <div className="bg-gray-800 w-full max-w-md rounded-2xl p-6 border border-gray-600">
                                <div className="flex justify-between items-start mb-6">
                                    <h2 className="text-3xl font-bold">{selectedChar.name}</h2>
                                    <button onClick={() => setView('list')} className="text-3xl">&times;</button>
                                </div>

                                <div className="flex justify-center gap-6 mb-8">
                                    <button onClick={() => updateHP(selectedChar, -1)} className="w-16 h-16 bg-red-600 rounded-full text-2xl font-bold">-1</button>
                                    <div className="text-center">
                                        <div className="text-4xl font-black">{selectedChar.hp}</div>
                                        <div className="text-xs text-gray-400">POINTS DE VIE</div>
                                    </div>
                                    <button onClick={() => updateHP(selectedChar, 1)} className="w-16 h-16 bg-green-600 rounded-full text-2xl font-bold">+1</button>
                                </div>

                                <div className="mb-6">
                                    <p className="text-xs font-bold text-gray-500 mb-3 uppercase tracking-widest">États & Conditions</p>
                                    <div className="grid grid-cols-2 gap-2">
                                        {LISTE_CONDITIONS.map(cond => (
                                            <button key={cond} onClick={() => toggleCondition(selectedChar, cond)} 
                                                className={`p-2 rounded-lg text-[10px] font-bold border transition-colors ${selectedChar.conditions?.includes(cond) ? 'bg-red-600 border-red-400' : 'bg-gray-700 border-gray-600 text-gray-400'}`}>
                                                {cond}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={() => setView('form')} className="flex-1 p-3 bg-gray-700 rounded-xl font-bold">Modifier</button>
                                    <button onClick={async () => { if(confirm('Supprimer?')) { await db.collection("characters").doc(selectedChar.id).delete(); setView('list'); } }} className="p-3 bg-red-900/30 text-red-500 rounded-xl"><Icons.Trash /></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VUE MJ */}
                    {view === 'mj' && (
                        <div className="fixed inset-0 bg-gray-900 z-50 p-4 overflow-y-auto">
                            <div className="max-w-md mx-auto">
                                <button onClick={() => setView('list')} className="mb-6 flex items-center gap-2 text-blue-400"><Icons.ChevronLeft /> Retour</button>
                                <h2 className="text-2xl font-bold mb-6 italic">Ordre d'Initiative</h2>
                                <div className="space-y-3">
                                    {sortedMJ.map((c, i) => (
                                        <div key={c.id} className="bg-gray-800 p-4 rounded-xl border-l-4 border-blue-600 flex justify-between items-center shadow-lg">
                                            <div className="flex items-center gap-4">
                                                <span className="text-2xl font-black text-gray-600">#{i+1}</span>
                                                <div>
                                                    <div className="font-bold text-lg">{c.name}</div>
                                                    <div className="text-xs text-gray-400">PV: {c.hp}/{c.hpMax} | DEF: {c.def}</div>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-[10px] text-gray-500 font-bold uppercase">Init</div>
                                                <div className="text-2xl font-mono font-bold">{c.init}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'form' && <CharacterForm initialData={selectedChar} onSave={handleSave} onCancel={() => setView('list')} />}

                    <button onClick={() => { setSelectedChar(null); setView('form'); }} className="fixed bottom-6 right-6 w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform z-40">
                        <Icons.Plus />
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
