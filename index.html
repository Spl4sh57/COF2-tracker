<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suivi COF2 (Partagé) - Amélioré</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            overscroll-behavior-y: none;
            background-color: #1a1a1a;
            color: #e5e5e5;
        }
        .condition-badge {
            transition: all 0.2s;
            cursor: pointer;
        }
        .condition-active {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #f87171 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCI5jcHG5D0z0lRJk2Dya4wZQw5s-xINY0",
            authDomain: "tracker-cof2.firebaseapp.com",
            projectId: "tracker-cof2",
            storageBucket: "tracker-cof2.firebasestorage.app",
            messagingSenderId: "550291814114",
            appId: "1:550291814114:web:0a6d3e9e1646bbdf4210bb"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // --- CONSTANTES ---
        const LISTE_CONDITIONS = [
            "Aveuglé", "Affaibli", "Essoufflé", "Étourdi", "Immobilisé", 
            "Invalide", "Paralysé", "Ralenti", "Renversé", "Surpris"
        ];

        // --- COMPOSANTS ICONES ---
        const Icons = {
            Plus: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Shield: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
            Zap: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            ChevronLeft: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Trash: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Alert: ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        };

        // --- COMPOSANT : CARTE PERSONNAGE ---
        const CharacterCard = ({ char, onUpdateHP, onViewDetail }) => {
            const hpPercent = Math.max(0, Math.min(100, (char.hp / char.hpMax) * 100));
            const hpColor = hpPercent > 50 ? 'bg-green-500' : hpPercent > 20 ? 'bg-yellow-500' : 'bg-red-500';

            return (
                <div onClick={() => onViewDetail(char)} className="bg-gray-800 rounded-xl p-4 shadow-lg border border-gray-700 active:scale-95 transition-transform">
                    <div className="flex justify-between items-start mb-3">
                        <div>
                            <h3 className="text-xl font-bold text-white">{char.name}</h3>
                            <p className="text-gray-400 text-sm">{char.class || 'Aventurier'}</p>
                        </div>
                        <div className="bg-blue-900/30 text-blue-400 px-3 py-1 rounded-full border border-blue-800 flex items-center gap-1">
                            <Icons.Zap size={14} /> <span className="font-bold">{char.init || 0}</span>
                        </div>
                    </div>

                    {/* Barre de Vie */}
                    <div className="mb-3">
                        <div className="flex justify-between text-xs mb-1">
                            <span>PV: {char.hp} / {char.hpMax}</span>
                            <span>{Math.round(hpPercent)}%</span>
                        </div>
                        <div className="w-full bg-gray-700 h-2.5 rounded-full overflow-hidden">
                            <div className={`h-full ${hpColor} transition-all duration-500`} style={{ width: `${hpPercent}%` }}></div>
                        </div>
                    </div>

                    {/* Affichage des conditions actives */}
                    <div className="flex flex-wrap gap-1 mt-2">
                        {char.conditions && char.conditions.map(c => (
                            <span key={c} className="text-[10px] bg-red-900/50 text-red-200 px-2 py-0.5 rounded border border-red-700 uppercase font-black">
                                {c}
                            </span>
                        ))}
                    </div>
                </div>
            );
        };

        // --- COMPOSANT : VUE MJ (TRIÉ PAR INITIATIVE) ---
        const DMView = ({ characters, onClose }) => {
            // TRI AUTOMATIQUE PAR INITIATIVE
            const sortedChars = useMemo(() => {
                return [...characters].sort((a, b) => (Number(b.init) || 0) - (Number(a.init) || 0));
            }, [characters]);

            return (
                <div className="fixed inset-0 bg-gray-900 z-50 overflow-y-auto p-4">
                    <div className="max-w-2xl mx-auto">
                        <div className="flex items-center gap-4 mb-6">
                            <button onClick={onClose} className="p-2 bg-gray-800 rounded-full"><Icons.ChevronLeft /></button>
                            <h2 className="text-2xl font-bold">Tableau du MJ (Ordre d'Initiative)</h2>
                        </div>
                        
                        <div className="space-y-3">
                            {sortedChars.map((char, index) => (
                                <div key={char.id} className="bg-gray-800 p-4 rounded-lg flex items-center gap-4 border-l-4 border-blue-500 shadow-md">
                                    <div className="text-2xl font-black text-blue-400 w-8 italic">#{index + 1}</div>
                                    <div className="flex-1">
                                        <div className="font-bold text-lg">{char.name}</div>
                                        <div className="text-sm text-gray-400">PV: {char.hp}/{char.hpMax} | DEF: {char.def}</div>
                                        <div className="flex flex-wrap gap-1 mt-1">
                                            {char.conditions && char.conditions.map(c => <span key={c} className="text-[9px] bg-red-600 px-1 rounded text-white">{c}</span>)}
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-xs text-gray-500 uppercase font-bold">Initiative</div>
                                        <div className="text-2xl font-mono font-bold text-white">{char.init}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPOSANT PRINCIPAL ---
        const App = () => {
            const [characters, setCharacters] = useState([]);
            const [view, setView] = useState('list'); // 'list', 'form', 'detail', 'mj'
            const [selectedChar, setSelectedChar] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const unsubscribe = db.collection("characters").onSnapshot(snapshot => {
                    const chars = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCharacters(chars);
                });
                return () => unsubscribe();
            }, []);

            const saveCharacter = async (charData) => {
                setIsSaving(true);
                try {
                    if (selectedChar) {
                        await db.collection("characters").doc(selectedChar.id).update(charData);
                    } else {
                        await db.collection("characters").add({ ...charData, conditions: [] });
                    }
                    setView('list');
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            const toggleCondition = async (char, condition) => {
                const currentConditions = char.conditions || [];
                const newConditions = currentConditions.includes(condition)
                    ? currentConditions.filter(c => c !== condition)
                    : [...currentConditions, condition];
                
                await db.collection("characters").doc(char.id).update({ conditions: newConditions });
            };

            // ... (Ici on simplifie pour l'exemple, mais tu gardes ta logique de formulaire)

            return (
                <div className="max-w-4xl mx-auto p-4 pb-24">
                    <header className="flex justify-between items-center mb-8 pt-4">
                        <h1 className="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">COF2 TRACKER</h1>
                        <button onClick={() => setView('mj')} className="bg-gray-800 p-3 rounded-xl border border-gray-700 shadow-lg flex items-center gap-2">
                            <Icons.Shield size={20} className="text-blue-400" />
                            <span className="font-bold text-sm">Vue MJ</span>
                        </button>
                    </header>

                    {/* Liste des Personnages */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {characters.map(char => (
                            <CharacterCard 
                                key={char.id} 
                                char={char} 
                                onViewDetail={(c) => { setSelectedChar(c); setView('detail'); }} 
                            />
                        ))}
                    </div>

                    {/* MODAL DETAIL + ETATS */}
                    {view === 'detail' && selectedChar && (
                        <div className="fixed inset-0 bg-black/90 z-50 p-4 flex items-center justify-center">
                            <div className="bg-gray-800 w-full max-w-md rounded-2xl p-6 border border-gray-600">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">{selectedChar.name}</h2>
                                    <button onClick={() => setView('list')} className="text-gray-400 p-2 text-2xl">×</button>
                                </div>

                                <div className="mb-6">
                                    <h3 className="text-sm font-bold text-gray-400 uppercase mb-3 flex items-center gap-2">
                                        <Icons.Alert size={16} /> États et Conditions
                                    </h3>
                                    <div className="grid grid-cols-2 gap-2">
                                        {LISTE_CONDITIONS.map(cond => (
                                            <div 
                                                key={cond}
                                                onClick={() => toggleCondition(selectedChar, cond)}
                                                className={`p-2 rounded-lg border border-gray-600 text-xs font-bold text-center transition-colors 
                                                    ${(selectedChar.conditions || []).includes(cond) ? 'bg-red-600 text-white border-red-400 shadow-inner' : 'bg-gray-700 text-gray-300'}`}
                                            >
                                                {cond}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <button 
                                    onClick={async () => { if(confirm('Supprimer?')) { await db.collection("characters").doc(selectedChar.id).delete(); setView('list'); } }}
                                    className="w-full p-3 bg-red-900/20 text-red-500 rounded-xl font-bold flex items-center justify-center gap-2 border border-red-900/50"
                                >
                                    <Icons.Trash size={18} /> Supprimer le personnage
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'mj' && <DMView characters={characters} onClose={() => setView('list')} />}
                    
                    {/* Bouton Ajout */}
                    <button 
                        onClick={() => { setSelectedChar(null); setView('form'); }} 
                        className="fixed bottom-8 right-6 w-16 h-16 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform"
                    >
                        <Icons.Plus size={32} />
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
